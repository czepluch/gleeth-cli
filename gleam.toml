name = "gleeth_cli"
version = "1.0.0"
description = "CLI tool for Ethereum - query blocks, balances, transactions, sign and send, manage wallets"
licences = ["MIT"]
repository = { type = "github", user = "czepluch", repo = "gleeth-cli" }

[dependencies]
gleam_stdlib = ">= 0.60.0 and < 0.63.0"
gleeth = ">= 1.2.0 and < 3.0.0"
argv = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
gleam_json = ">= 3.0.0 and < 3.1.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 0.16.0 and < 1.0.0"
bigi = ">= 3.0.0 and < 4.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 4.1.1 and < 5.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
