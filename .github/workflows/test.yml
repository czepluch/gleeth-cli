name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          elixir-version: "1.19"
      - run: mix local.hex --force
      - run: gleam deps download
      - run: gleam build
      - run: gleam format --check src test
